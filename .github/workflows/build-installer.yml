name: Genera Installer e Pubblica Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Fondamentale: diamo al bot il permesso di scrivere nella sezione Releases
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 📥 Clona il repository
      uses: actions/checkout@v4

    - name: ⚙️ Installa Inno Setup compiler
      run: choco install innosetup -y

    - name: 🔨 Compila il file .exe autoestraente
      run: iscc setup.iss

    - name: 🚀 Pubblica l'eseguibile nella sezione Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "latest" # Aggiornerà sempre questo "tag"
        name: "Ultima Versione - Elenco VIP"
        body: "Scarica l'eseguibile qui sotto per installare o aggiornare la dashboard sul tuo PC Windows."
        files: Output/Installa_Elenco_VIP.exe
